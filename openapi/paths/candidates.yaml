candidates:
  get:
    tags:
      - Candidate
    summary: 신규 용어 후보 목록 조회
    operationId: listCandidates
    x-required-roles:
      - ADMIN
      - DATA_STEWARD
      - DEVELOPMENT_LEAD
      - ARCHITECT
      - PLANNER
      - DEVELOPER
      - OPERATOR
      - VIEWER
    parameters:
      - name: q
        in: query
        required: false
        description: 후보 한글명, 영문명, 약어 검색어
        schema:
          type: string
          example: 고객선호배송시간대
      - name: status
        in: query
        required: false
        description: 후보 상태 필터
        schema:
          $ref: '../schemas/candidate.yaml#/CandidateStatus'
      - name: domainName
        in: query
        required: false
        description: 도메인명 필터
        schema:
          type: string
          example: 고객
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 200
          default: 20
    responses:
      '200':
        description: 후보 목록 조회 성공
        content:
          application/json:
            schema:
              $ref: '../schemas/candidate.yaml#/TermCandidateListResponse'
            examples:
              preferredDeliveryTimeSlotCandidates:
                value:
                  items:
                    - candidateId: CAND-000001
                      koreanName: 고객선호배송시간대
                      englishName: Customer Preferred Delivery Time Slot
                      englishAbbreviation: CUST_PREF_DLV_TM_SLOT
                      domainName: 고객
                      status: Draft
                      requestedBy: planner01
                  page:
                    page: 0
                    size: 20
                    totalElements: 1
                    totalPages: 1
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../openapi.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../openapi.yaml#/components/responses/Forbidden'
  post:
    tags:
      - Candidate
    summary: 신규 용어 후보 등록
    operationId: createCandidate
    x-required-roles:
      - ADMIN
      - DATA_STEWARD
      - DEVELOPMENT_LEAD
      - ARCHITECT
      - PLANNER
      - DEVELOPER
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/candidate.yaml#/TermCandidateCreateRequest'
          examples:
            preferredDeliveryTimeSlot:
              value:
                koreanName: 고객선호배송시간대
                englishName: Customer Preferred Delivery Time Slot
                englishAbbreviation: CUST_PREF_DLV_TM_SLOT
                domainName: 고객
                businessDefinition: 고객이 선호하는 배송 시간대
                usageContext: 배송 옵션 추천과 배송 요청 화면에서 사용
                physicalType: VARCHAR
                digits: 20
                decimalPoint: 0
                requestedBy: planner01
    responses:
      '201':
        description: 후보 등록 성공
        content:
          application/json:
            schema:
              $ref: '../schemas/candidate.yaml#/TermCandidate'
            examples:
              preferredDeliveryTimeSlotDraft:
                value:
                  candidateId: CAND-000001
                  koreanName: 고객선호배송시간대
                  englishName: Customer Preferred Delivery Time Slot
                  englishAbbreviation: CUST_PREF_DLV_TM_SLOT
                  domainName: 고객
                  businessDefinition: 고객이 선호하는 배송 시간대
                  usageContext: 배송 옵션 추천과 배송 요청 화면에서 사용
                  physicalType: VARCHAR
                  digits: 20
                  decimalPoint: 0
                  status: Draft
                  requestedBy: planner01
                  similarTerms:
                    - termId: T-000001
                      koreanName: 고객번호
                      englishName: Customer Number
                      dbColumn: CUST_NO
                      apiField: customerNumber
                      reason: 같은 고객 도메인의 기존 표준 용어
                  histories:
                    - historyId: CAND-HIST-000001
                      candidateId: CAND-000001
                      status: Draft
                      reason: 신규 후보 등록
                      actor: planner01
                      createdAt: '2026-05-30T09:00:00+09:00'
                  createdAt: '2026-05-30T09:00:00+09:00'
                  updatedAt: '2026-05-30T09:00:00+09:00'
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../openapi.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../openapi.yaml#/components/responses/Forbidden'
      '409':
        $ref: '../openapi.yaml#/components/responses/Conflict'

