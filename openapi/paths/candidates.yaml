      in: path
      required: true
      description: 후보 식별자
      schema:
        type: string
        example: CAND-000001
  get:
    tags:
      - Candidate
    summary: 신규 용어 후보 상세 조회
    operationId: getCandidate
    x-required-roles:
      - ADMIN
      - DATA_STEWARD
      - DEVELOPMENT_LEAD
      - ARCHITECT
      - PLANNER
      - DEVELOPER
      - OPERATOR
      - VIEWER
    responses:
      '200':
        description: 후보 상세 조회 성공
        content:
          application/json:
            schema:
              $ref: '../schemas/candidate.yaml#/TermCandidate'
      '401':
        $ref: '../openapi.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../openapi.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../openapi.yaml#/components/responses/NotFound'

