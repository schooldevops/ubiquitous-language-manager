exactSearch:
  get:
    tags:
      - Search
    summary: 정확 검색
    description: 한글 표준명, 영문명, DB 컬럼명, API 필드명, 코드 변수명이 정확히 일치하는 표준 용어를 검색한다.
    operationId: exactSearch
    x-required-roles:
      - ADMIN
      - DATA_STEWARD
      - DEVELOPMENT_LEAD
      - ARCHITECT
      - PLANNER
      - DEVELOPER
      - OPERATOR
      - VIEWER
    parameters:
      - name: q
        in: query
        required: true
        description: 정확히 일치시킬 검색어
        schema:
          type: string
          minLength: 1
          example: customerNumber
      - name: status
        in: query
        required: false
        description: 용어 상태 필터
        schema:
          $ref: '../schemas/enums.yaml#/TermStatus'
    responses:
      '200':
        description: 정확 검색 성공
        content:
          application/json:
            schema:
              $ref: '../schemas/search.yaml#/SearchResponse'
            examples:
              customerNumber:
                value:
                  query: customerNumber
                  items:
                    - termId: T-000001
                      standardTerm: 고객번호
                      englishName: Customer Number
                      dbColumn: CUST_NO
                      apiField: customerNumber
                      codeVariable: customerNumber
                      status: Approved
                      domainName: 고객
                      businessDefinition: 회사에서 고객을 업무적으로 식별하기 위해 사용하는 번호
                      usageContext: 주문, 계약, 청구, 상담 등에서 고객 식별 기준으로 사용
                      score: 1
                      matchedExpressions:
                        - expressionType: API_FIELD
                          expressionValue: customerNumber
                          matchType: Exact
                          inputExpression: customerNumber
                      recommendations:
                        - action: UseStandardTerm
                          recommendedTermId: T-000001
                          recommendedTerm: 고객번호
                          recommendedExpression: customerNumber
                          reason: 입력 표현이 승인된 표준 API 필드명과 일치함
                          severity: Info
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../openapi.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../openapi.yaml#/components/responses/Forbidden'

aliasSearch:
  get:
    tags:
      - Search
    summary: 유사어 검색
    description: 유사어, 별칭, 문맥 확인 필요 표현을 표준 용어로 변환하기 위해 검색한다.
    operationId: aliasSearch
    x-required-roles:
      - ADMIN
      - DATA_STEWARD
      - DEVELOPMENT_LEAD
      - ARCHITECT
      - PLANNER
      - DEVELOPER
      - OPERATOR
      - VIEWER
    parameters:
      - name: q
        in: query
        required: true
        description: 유사어 또는 비표준 표현
        schema:
          type: string
          minLength: 1
          example: 고객ID
    responses:
      '200':
        description: 유사어 검색 성공
        content:
          application/json:
            schema:
              $ref: '../schemas/search.yaml#/SearchResponse'
            examples:
              customerIdToCustomerNumber:
                summary: 고객ID를 고객번호로 권고
                value:
                  query: 고객ID
                  items:
                    - termId: T-000001
                      standardTerm: 고객번호
                      englishName: Customer Number
                      dbColumn: CUST_NO
                      apiField: customerNumber
                      codeVariable: customerNumber
                      status: Approved
                      domainName: 고객
                      businessDefinition: 회사에서 고객을 업무적으로 식별하기 위해 사용하는 번호
                      usageContext: 주문, 계약, 청구, 상담 등에서 고객 식별 기준으로 사용
                      score: 0.96
                      matchedExpressions:
                        - expressionType: Korean
                          expressionValue: 고객ID
                          matchType: Alias
                          inputExpression: 고객ID
                      recommendations:
                        - action: UseStandardTerm
                          recommendedTermId: T-000001
                          recommendedTerm: 고객번호
                          recommendedExpression: customerNumber
                          reason: 고객ID는 고객번호의 유사어이며 표준 API 필드명은 customerNumber임
                          severity: Warning
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../openapi.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../openapi.yaml#/components/responses/Forbidden'

domainSearch:
  get:
    tags:
      - Search
    summary: 도메인별 검색
    description: 특정 업무 도메인에 속한 표준 용어를 조회한다.
    operationId: domainSearch
    x-required-roles:
      - ADMIN
      - DATA_STEWARD
      - DEVELOPMENT_LEAD
      - ARCHITECT
      - PLANNER
      - DEVELOPER
      - OPERATOR
      - VIEWER
    parameters:
      - name: domainName
        in: path
        required: true
        description: 업무 도메인명
        schema:
          type: string
          minLength: 1
          example: 주문
      - name: status
        in: query
        required: false
        description: 용어 상태 필터
        schema:
          $ref: '../schemas/enums.yaml#/TermStatus'
      - name: page
        in: query
        required: false
        description: 페이지 번호
        schema:
          type: integer
          format: int32
          minimum: 0
          default: 0
      - name: size
        in: query
        required: false
        description: 페이지 크기
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 200
          default: 20
    responses:
      '200':
        description: 도메인별 검색 성공
        content:
          application/json:
            schema:
              $ref: '../schemas/search.yaml#/SearchResponse'
            examples:
              orderDomain:
                value:
                  query: 주문
                  items:
                    - termId: T-000002
                      standardTerm: 주문번호
                      englishName: Order Number
                      dbColumn: ORD_NO
                      apiField: orderNumber
                      codeVariable: orderNumber
                      status: Approved
                      domainName: 주문
                      businessDefinition: 주문을 업무적으로 식별하기 위해 사용하는 번호
                      usageContext: 주문 조회, 주문 상세, 결제 연결에서 주문 식별 기준으로 사용
                      score: 1
                      matchedExpressions:
                        - expressionType: Korean
                          expressionValue: 주문
                          matchType: Domain
                          inputExpression: 주문
                      recommendations:
                        - action: UseStandardTerm
                          recommendedTermId: T-000002
                          recommendedTerm: 주문번호
                          recommendedExpression: orderNumber
                          reason: 주문 도메인의 승인된 표준 용어임
                          severity: Info
                  page:
                    page: 0
                    size: 20
                    totalElements: 1
                    totalPages: 1
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../openapi.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../openapi.yaml#/components/responses/Forbidden'

deprecatedSearch:
  get:
    tags:
      - Search
    summary: 폐기어 검색
    description: Deprecated 또는 사용 금지 표현을 검색하고 대체 표준 용어를 반환한다.
    operationId: deprecatedSearch
    x-required-roles:
      - ADMIN
      - DATA_STEWARD
      - DEVELOPMENT_LEAD
      - ARCHITECT
      - PLANNER
      - DEVELOPER
      - OPERATOR
      - VIEWER
    parameters:
      - name: q
        in: query
        required: true
        description: 폐기어 또는 사용 금지 표현
        schema:
          type: string
          minLength: 1
          example: CUST_ID
    responses:
      '200':
        description: 폐기어 검색 성공
        content:
          application/json:
            schema:
              $ref: '../schemas/search.yaml#/DeprecatedSearchResponse'
            examples:
              custIdToCustNo:
                value:
                  query: CUST_ID
                  items:
                    - deprecatedExpression: CUST_ID
                      reason: 기술 식별자와 업무 고객번호가 혼동될 수 있음
                      replacementTerm:
                        termId: T-000001
                        standardTerm: 고객번호
                        englishName: Customer Number
                        dbColumn: CUST_NO
                        apiField: customerNumber
                        codeVariable: customerNumber
                        status: Approved
                        domainName: 고객
                        businessDefinition: 회사에서 고객을 업무적으로 식별하기 위해 사용하는 번호
                        usageContext: 주문, 계약, 청구, 상담 등에서 고객 식별 기준으로 사용
                        score: 0.99
                        matchedExpressions:
                          - expressionType: DB_COLUMN
                            expressionValue: CUST_ID
                            matchType: Deprecated
                            inputExpression: CUST_ID
                        recommendations:
                          - action: ReplaceDeprecatedTerm
                            recommendedTermId: T-000001
                            recommendedTerm: 고객번호
                            recommendedExpression: CUST_NO
                            reason: CUST_ID 대신 고객번호의 표준 DB 컬럼명 CUST_NO를 사용해야 함
                            severity: Error
                      recommendation:
                        action: ReplaceDeprecatedTerm
                        recommendedTermId: T-000001
                        recommendedTerm: 고객번호
                        recommendedExpression: CUST_NO
                        reason: CUST_ID 대신 고객번호의 표준 DB 컬럼명 CUST_NO를 사용해야 함
                        severity: Error
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../openapi.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../openapi.yaml#/components/responses/Forbidden'

semanticSearch:
  post:
    tags:
      - Search
    summary: 의미 기반 검색
    description: 자연어 질의문을 용어 문서 임베딩과 비교해 표준 용어 후보를 반환한다.
    operationId: semanticSearch
    x-required-roles:
      - ADMIN
      - DATA_STEWARD
      - DEVELOPMENT_LEAD
      - ARCHITECT
      - PLANNER
      - DEVELOPER
      - OPERATOR
      - VIEWER
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/search.yaml#/SemanticSearchRequest'
          examples:
            orderDate:
              value:
                query: 주문이 발생한 날짜
                domainNames:
                  - 주문
                statuses:
                  - Approved
                limit: 5
    responses:
      '200':
        description: 의미 기반 검색 성공
        content:
          application/json:
            schema:
              $ref: '../schemas/search.yaml#/SemanticSearchResponse'
            examples:
              orderDate:
                value:
                  query: 주문이 발생한 날짜
                  items:
                    - termId: T-000005
                      standardTerm: 주문일자
                      englishName: Order Date
                      dbColumn: ORD_DT
                      apiField: orderDate
                      status: Approved
                      similarityScore: 0.92
                      recommendationReason: 질의의 주문, 발생, 날짜 의미가 주문일자의 업무 정의와 가장 유사함
                      differenceDescription: 주문일자는 날짜만 표현하고 주문일시는 시분초까지 포함함
                      guidance: Approved 용어이므로 기획서와 개발 산출물에 사용할 수 있음
                      validationIssues: []
                    - termId: T-000010
                      standardTerm: 주문일시
                      englishName: Order Date Time
                      dbColumn: ORD_DTTM
                      apiField: orderDateTime
                      status: Approved
                      similarityScore: 0.81
                      recommendationReason: 주문 발생 시점을 시분초까지 표현해야 할 때 적합함
                      differenceDescription: 주문일시는 날짜와 시간을 모두 포함하고 주문일자는 날짜만 포함함
                      guidance: Approved 용어이므로 기획서와 개발 산출물에 사용할 수 있음
                      validationIssues: []
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../openapi.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../openapi.yaml#/components/responses/Forbidden'
