prReview:
  post:
    tags:
      - Review
    summary: PR 변경 파일 검증
    description: PR 또는 CI에서 전달한 여러 변경 파일을 표준 용어 기준으로 검증하고 파일별 결과와 전체 집계를 반환한다.
    operationId: reviewPullRequestArtifacts
    x-required-roles:
      - ADMIN
      - DATA_STEWARD
      - DEVELOPMENT_LEAD
      - ARCHITECT
      - DEVELOPER
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/artifact-validation.yaml#/PullRequestArtifactReviewRequest'
    responses:
      '200':
        description: PR 변경 파일 검증 성공
        content:
          application/json:
            schema:
              $ref: '../schemas/artifact-validation.yaml#/PullRequestArtifactReviewResult'
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../openapi.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../openapi.yaml#/components/responses/Forbidden'
