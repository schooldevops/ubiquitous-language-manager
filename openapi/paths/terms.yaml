terms:
  get:
    tags:
      - Term
    summary: 표준 용어 목록 조회
    description: 한글명, 영문명, 약어, 도메인, 상태 조건으로 표준 용어 목록을 조회한다.
    operationId: listTerms
    x-required-roles:
      - ADMIN
      - DATA_STEWARD
      - DEVELOPMENT_LEAD
      - ARCHITECT
      - PLANNER
      - DEVELOPER
      - OPERATOR
      - VIEWER
    parameters:
      - name: q
        in: query
        required: false
        description: 한글명, 영문명, 약어, API 필드명 검색어
        schema:
          type: string
      - name: domainName
        in: query
        required: false
        description: 도메인명 필터
        schema:
          type: string
      - name: status
        in: query
        required: false
        description: 용어 상태 필터
        schema:
          $ref: '../schemas/enums.yaml#/TermStatus'
      - name: page
        in: query
        required: false
        description: 페이지 번호
        schema:
          type: integer
          format: int32
          minimum: 0
          default: 0
      - name: size
        in: query
        required: false
        description: 페이지 크기
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 200
          default: 20
    responses:
      '200':
        description: 표준 용어 목록 조회 성공
        content:
          application/json:
            schema:
              $ref: '../schemas/term.yaml#/TermListResponse'
            examples:
              customerNumber:
                value:
                  items:
                    - termId: T-000001
                      termNumber: TERM-000001
                      domainName: 고객
                      koreanName: 고객번호
                      englishName: Customer Number
                      englishAbbreviation: CUST_NO
                      apiFieldName: customerNumber
                      status: Approved
                      relatedSystems:
                        - CRM
                        - ORDER
                  page:
                    page: 0
                    size: 20
                    totalElements: 1
                    totalPages: 1
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../openapi.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../openapi.yaml#/components/responses/Forbidden'
  post:
    tags:
      - Term
    summary: 표준 용어 등록
    description: 신규 표준 용어를 Draft 또는 지정 상태로 등록한다.
    operationId: createTerm
    x-required-roles:
      - ADMIN
      - DATA_STEWARD
      - DEVELOPMENT_LEAD
      - ARCHITECT
      - PLANNER
      - DEVELOPER
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/term.yaml#/TermCreateRequest'
          examples:
            customerNumber:
              value:
                domainName: 고객
                usageType: 표준항목
                koreanName: 고객번호
                englishName: Customer Number
                englishAbbreviation: CUST_NO
                businessDefinition: 회사에서 고객을 업무적으로 식별하기 위해 사용하는 번호
                usageContext: 주문, 계약, 청구, 상담 등에서 고객 식별 기준으로 사용
                physicalType: VARCHAR
                digits: 20
                decimalPoint: 0
                owner: 고객도메인 데이터스튜어드
                status: Draft
    responses:
      '201':
        description: 표준 용어 등록 성공
        content:
          application/json:
            schema:
              $ref: '../schemas/term.yaml#/Term'
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../openapi.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../openapi.yaml#/components/responses/Forbidden'
      '409':
        $ref: '../openapi.yaml#/components/responses/Conflict'

