previewPromptTemplate:
  parameters:
    - name: templateId
      in: path
      required: true
      description: 프롬프트 템플릿 식별자
      schema:
        type: string
        example: PT-VIBE-001
  post:
    tags:
      - PromptTemplate
    summary: 프롬프트 템플릿 미리보기
    description: 요구사항, 데이터 사전 검색 결과, 신규 후보를 템플릿 변수로 주입해 AI 도구에 전달할 최종 프롬프트를 생성한다.
    operationId: previewPromptTemplate
    x-required-roles:
      - ADMIN
      - DATA_STEWARD
      - DEVELOPMENT_LEAD
      - ARCHITECT
      - PLANNER
      - DEVELOPER
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/prompt-template.yaml#/PromptTemplatePreviewRequest'
          examples:
            customerOrderApi:
              value:
                requirementText: 고객별 주문 내역을 조회하는 API 만들어줘.
                termMappings:
                  - concept: 고객번호
                    standardTerm: 고객번호
                    englishName: Customer Number
                    dbColumn: CUST_NO
                    apiField: customerNumber
                    codeVariable: customerNumber
                    status: Approved
                  - concept: 주문번호
                    standardTerm: 주문번호
                    englishName: Order Number
                    dbColumn: ORD_NO
                    apiField: orderNumber
                    codeVariable: orderNumber
                    status: Approved
                candidateTerms: []
    responses:
      '200':
        description: 프롬프트 템플릿 미리보기 성공
        content:
          application/json:
            schema:
              $ref: '../schemas/prompt-template.yaml#/PromptTemplatePreviewResponse'
      '400':
        $ref: '../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../openapi.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../openapi.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../openapi.yaml#/components/responses/NotFound'
