promptTemplates:
  get:
    tags:
      - PromptTemplate
    summary: 프롬프트 템플릿 목록 조회
    description: 바이브코딩과 기획서 작성에 사용할 데이터 사전 기반 AI 프롬프트 템플릿 목록을 조회한다.
    operationId: listPromptTemplates
    x-required-roles:
      - ADMIN
      - DATA_STEWARD
      - DEVELOPMENT_LEAD
      - ARCHITECT
      - PLANNER
      - DEVELOPER
      - OPERATOR
      - VIEWER
    parameters:
      - name: type
        in: query
        required: false
        description: 템플릿 유형 필터
        schema:
          $ref: '../schemas/prompt-template.yaml#/PromptTemplateType'
      - name: status
        in: query
        required: false
        description: 템플릿 상태 필터
        schema:
          $ref: '../schemas/prompt-template.yaml#/PromptTemplateStatus'
    responses:
      '200':
        description: 프롬프트 템플릿 목록 조회 성공
        content:
          application/json:
            schema:
              $ref: '../schemas/prompt-template.yaml#/PromptTemplateListResponse'
            examples:
              defaultTemplates:
                value:
                  items:
                    - templateId: PT-VIBE-001
                      type: VibeCoding
                      name: 사내 데이터 사전 기반 개발 규칙
                      version: 1.0.0
                      status: Active
                      description: DB, API, DTO, Entity, 테스트 생성 시 표준 용어를 강제하는 프롬프트
                      updatedAt: '2026-05-28T09:00:00+09:00'
                    - templateId: PT-PLAN-001
                      type: Planning
                      name: 데이터 사전 기반 기획서 작성 규칙
                      version: 1.0.0
                      status: Active
                      description: 요구사항과 기획서 표현을 표준 용어로 정규화하는 프롬프트
                      updatedAt: '2026-05-28T09:00:00+09:00'
      '401':
        $ref: '../openapi.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../openapi.yaml#/components/responses/Forbidden'

promptTemplatesByTemplateId:
  parameters:
    - name: templateId
      in: path
      required: true
      description: 프롬프트 템플릿 식별자
      schema:
        type: string
        example: PT-VIBE-001
  get:
    tags:
      - PromptTemplate
    summary: 프롬프트 템플릿 상세 조회
    description: 템플릿 본문, 변수, 버전 정책, 변경 이력을 조회한다.
    operationId: getPromptTemplate
    x-required-roles:
      - ADMIN
      - DATA_STEWARD
      - DEVELOPMENT_LEAD
      - ARCHITECT
      - PLANNER
      - DEVELOPER
      - OPERATOR
      - VIEWER
    responses:
      '200':
        description: 프롬프트 템플릿 상세 조회 성공
        content:
          application/json:
            schema:
              $ref: '../schemas/prompt-template.yaml#/PromptTemplate'
            examples:
              vibeCodingTemplate:
                value:
                  templateId: PT-VIBE-001
                  type: VibeCoding
                  name: 사내 데이터 사전 기반 개발 규칙
                  version: 1.0.0
                  status: Active
                  description: DB, API, DTO, Entity, 테스트 생성 시 표준 용어를 강제하는 프롬프트
                  body: |
                    # 사내 데이터 사전 기반 개발 규칙
                    요구사항: {{requirementText}}
                    표준 용어 매핑: {{termMappings}}
                    신규 후보: {{candidateTerms}}
                  variables:
                    - name: requirementText
                      description: 사용자가 입력한 요구사항
                      required: true
                      source: UserInput
                    - name: termMappings
                      description: 데이터 사전 검색 결과로 확정된 표준 용어 매핑 목록
                      required: true
                      source: DictionarySearch
                  versionPolicy: MAJOR는 출력 구조 변경, MINOR는 규칙 추가, PATCH는 문구 보완에 사용한다.
                  histories:
                    - historyId: PT-HIST-000001
                      templateId: PT-VIBE-001
                      version: 1.0.0
                      changeType: Created
                      reason: MVP3 기본 템플릿 등록
                      actor: system
                      createdAt: '2026-05-30T09:00:00+09:00'
                  createdAt: '2026-05-30T09:00:00+09:00'
                  updatedAt: '2026-05-30T09:00:00+09:00'
      '401':
        $ref: '../openapi.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../openapi.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../openapi.yaml#/components/responses/NotFound'

