termUploads:
  post:
    tags: [Term]
    operationId: uploadTerms
    summary: 용어 JSONL 파일 업로드(upsert)
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [file]
            properties:
              file:
                type: string
                format: binary
                description: JSONL 파일(.jsonl)
    responses:
      '200':
        description: 업로드 처리 결과
        content:
          application/json:
            schema:
              $ref: '../schemas/term-upload.yaml#/TermUploadResult'
  get:
    tags: [Term]
    operationId: listTermUploadBatches
    summary: 업로드 배치 목록(최근순)
    responses:
      '200':
        description: 배치 목록
        content:
          application/json:
            schema:
              $ref: '../schemas/term-upload.yaml#/TermUploadBatchListResponse'

termUploadById:
  get:
    tags: [Term]
    operationId: getTermUploadBatch
    summary: 업로드 배치 결과 단건 조회
    parameters:
      - name: uploadBatchId
        in: path
        required: true
        schema: { type: string }
    responses:
      '200':
        description: 배치 결과
        content:
          application/json:
            schema:
              $ref: '../schemas/term-upload.yaml#/TermUploadResult'
