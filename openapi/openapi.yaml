    TermApprovalRequest:
      $ref: './schemas/term.yaml#/TermApprovalRequest'
    TermDeprecationRequest:
      $ref: './schemas/term.yaml#/TermDeprecationRequest'
    TermChangeHistory:
      $ref: './schemas/term.yaml#/TermChangeHistory'
    TermChangeHistoryListResponse:
      $ref: './schemas/term.yaml#/TermChangeHistoryListResponse'
    SearchResponse:
