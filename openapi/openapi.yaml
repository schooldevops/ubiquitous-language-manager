  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: MVP에서는 placeholder로 정의하며, 실제 인증 구현 시 Spring Security와 연결한다.
  schemas:
    ErrorResponse:
      $ref: './schemas/common.yaml#/ErrorResponse'
    PageMetadata:
      $ref: './schemas/common.yaml#/PageMetadata'
    ValidationIssue:
      $ref: './schemas/common.yaml#/ValidationIssue'
    ValidationSeverity:
      $ref: './schemas/common.yaml#/ValidationSeverity'
    TermStatus:
      $ref: './schemas/enums.yaml#/TermStatus'
    ExpressionType:
      $ref: './schemas/enums.yaml#/ExpressionType'
    AliasType:
      $ref: './schemas/enums.yaml#/AliasType'
    RelationshipType:
      $ref: './schemas/enums.yaml#/RelationshipType'
    UserRole:
      $ref: './schemas/enums.yaml#/UserRole'
    Term:
      $ref: './schemas/term.yaml#/Term'
    TermSummary:
      $ref: './schemas/term.yaml#/TermSummary'
    TermCreateRequest:
      $ref: './schemas/term.yaml#/TermCreateRequest'
    TermUpdateRequest:
      $ref: './schemas/term.yaml#/TermUpdateRequest'
    TermListResponse:
      $ref: './schemas/term.yaml#/TermListResponse'
    TermExpression:
      $ref: './schemas/term.yaml#/TermExpression'
