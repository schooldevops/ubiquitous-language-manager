openapi: 3.0.3
info:
  title: AULMS API
  description: 데이터 사전 기반 유비쿼터스 랭기지 관리 시스템 API
  version: 0.1.0
  contact:
    name: AULMS Team
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: Term
    description: 표준 용어 등록, 조회, 수정, 승인, 폐기 API
  - name: TermUpload
    description: 용어 JSONL 일괄 업로드 API
  - name: Expression
    description: DB 컬럼명, API 필드명, 코드 변수명 등 표현 매핑 API
  - name: Alias
    description: 유사어, 별칭, 금지어 관리 API
  - name: Search
    description: 정확 검색, 유사어 검색, 의미 기반 검색 API
  - name: Review
    description: 기획서, OpenAPI, DDL, 코드, PR 검증 API
  - name: Candidate
    description: 신규 용어 후보 등록, 검토, 승격 API
  - name: PromptTemplate
    description: AI 개발 도구와 기획서 작성 도구가 사용하는 표준 프롬프트 템플릿 API
  - name: AI
    description: 데이터 사전 기반 AI 산출물 생성 지원 API
  - name: Governance
    description: 승인, 폐기, 정책, 권한 관련 API
  - name: Relationship
    description: 용어 관계와 Graphify 관계 검색 API
  - name: Impact
    description: 용어 변경 영향도 분석 API
  - name: Dashboard
    description: 메인 대시보드 요약 API
paths:
  /dashboard:
    $ref: './paths/dashboard.yaml#/dashboard'
  /terms:
    $ref: './paths/terms.yaml#/terms'
  /terms/{termId}:
    $ref: './paths/terms.yaml#/termsByTermId'
  /terms/{termId}/approve:
    $ref: './paths/terms.yaml#/approveTerm'
  /terms/{termId}/deprecate:
    $ref: './paths/terms.yaml#/deprecateTerm'
  /terms/{termId}/history:
    $ref: './paths/terms.yaml#/termHistory'
  /terms/{termId}/expressions:
    $ref: './paths/terms.yaml#/termExpressions'
  /terms/{termId}/aliases:
    $ref: './paths/terms.yaml#/termAliases'
  /terms/uploads:
    $ref: './paths/term-uploads.yaml#/termUploads'
  /terms/uploads/{uploadBatchId}:
    $ref: './paths/term-uploads.yaml#/termUploadById'
  /search/exact:
    $ref: './paths/search.yaml#/exactSearch'
  /search/alias:
    $ref: './paths/search.yaml#/aliasSearch'
  /search/domain/{domainName}:
    $ref: './paths/search.yaml#/domainSearch'
  /search/deprecated:
    $ref: './paths/search.yaml#/deprecatedSearch'
  /search/semantic:
    $ref: './paths/search.yaml#/semanticSearch'
  /reviews/document:
    $ref: './paths/reviews.yaml#/documentReview'
  /reviews/openapi:
    $ref: './paths/reviews.yaml#/openapiReview'
  /reviews/ddl:
    $ref: './paths/reviews.yaml#/ddlReview'
  /reviews/code:
    $ref: './paths/reviews.yaml#/codeReview'
  /reviews/pr:
    $ref: './paths/reviews.yaml#/prReview'
  /artifact-validations:
    $ref: './paths/artifact-validations.yaml#/artifactValidation'
  /candidates:
    $ref: './paths/candidates.yaml#/candidates'
  /candidates/{candidateId}:
    $ref: './paths/candidates.yaml#/candidatesByCandidateId'
  /candidates/{candidateId}/review:
    $ref: './paths/candidates.yaml#/reviewCandidate'
  /candidates/{candidateId}/promote:
    $ref: './paths/candidates.yaml#/promoteCandidate'
  /prompt-templates:
    $ref: './paths/prompt-templates.yaml#/promptTemplates'
  /prompt-templates/{templateId}:
    $ref: './paths/prompt-templates.yaml#/promptTemplatesByTemplateId'
  /prompt-templates/{templateId}/versions:
    $ref: './paths/prompt-templates.yaml#/promptTemplateVersions'
  /prompt-templates/{templateId}/preview:
    $ref: './paths/prompt-templates.yaml#/previewPromptTemplate'
  /ai/development-assist:
    $ref: './paths/ai.yaml#/developmentAssist'
  /ai/term-recommendation:
    $ref: './paths/ai.yaml#/termRecommendation'
  /relationships/terms/{termId}:
    $ref: './paths/relationships.yaml#/termRelationships'
  /relationships/domains/{domainName}/terms:
    $ref: './paths/relationships.yaml#/domainTerms'
  /relationships/columns/{columnName}/systems:
    $ref: './paths/relationships.yaml#/columnSystems'
  /relationships/deprecated:
    $ref: './paths/relationships.yaml#/deprecatedUsages'
  /impact/terms/{termId}:
    $ref: './paths/impact.yaml#/termImpact'
