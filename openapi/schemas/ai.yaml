AssistTargetArtifact:
  type: string
  description: AI 지원 API가 생성할 산출물 유형
  enum:
    - DTO
    - OPENAPI_SCHEMA
    - SQL_EXAMPLE
  example: DTO

TermRecommendationMode:
  type: string
  description: 추천을 적용할 작성 화면 유형
  enum:
    - TERM_CREATE
    - CANDIDATE_CREATE
  example: TERM_CREATE

TermRecommendationRequest:
  type: object
  description: 한글 용어명을 기준으로 RAG, Graph, 추론 단계를 거쳐 용어 등록 초안을 추천하는 요청
  required:
    - koreanName
    - mode
  properties:
    koreanName:
      type: string
      minLength: 1
      description: 추천 기준이 되는 한글 용어명
      example: 고객선호배송시간대
    mode:
      $ref: '#/TermRecommendationMode'
    currentDomainName:
      type: string
      description: 화면에서 이미 선택된 도메인
      example: 고객
    currentBusinessDefinition:
      type: string
      description: 사용자가 일부 입력한 업무 정의
      example: 고객이 선호하는 배송 시간대를 저장하기 위한 항목
    currentUsageContext:
      type: string
      description: 사용자가 일부 입력한 사용 맥락
      example: 배송 요청 화면과 배송 옵션 추천 API에서 사용

RecommendedTermDraft:
  type: object
  description: 추천으로 채워줄 용어 초안
  required:
    - domainName
    - usageType
    - englishName
    - englishAbbreviation
    - businessDefinition
    - usageContext
    - physicalType
    - digits
    - decimalPoint
    - owner
  properties:
    domainName:
      type: string
      example: 고객
    usageType:
      type: string
      example: 표준항목
    englishName:
      type: string
      example: Customer Preferred Delivery Time Slot
    englishAbbreviation:
      type: string
      example: CUST_PREF_DLV_TM_SLOT
    businessDefinition:
      type: string
      example: 고객 도메인에서 고객이 선호하는 배송 시간대를 관리하기 위해 사용하는 표준 항목
    usageContext:
      type: string
      example: 배송 옵션 추천, 배송 요청 화면, 배송 정책 API에서 고객별 선호 시간대 기준으로 사용
    physicalType:
      type: string
      example: VARCHAR
    digits:
      type: integer
      format: int32
      example: 40
    decimalPoint:
      type: integer
      format: int32
      example: 0
    owner:
      type: string
      example: 고객도메인 데이터스튜어드

RecommendationEvidence:
  type: object
  description: RAG 검색으로 수집한 근거 용어
  required:
    - termId
    - standardTerm
    - englishName
    - dbColumn
    - apiField
    - domainName
    - source
    - score
    - reason
  properties:
    termId:
      type: string
      example: T-000001
    standardTerm:
      type: string
      example: 고객번호
    englishName:
      type: string
      example: Customer Number
    dbColumn:
      type: string
      example: CUST_NO
    apiField:
      type: string
      example: customerNumber
    domainName:
      type: string
      example: 고객
    source:
      type: string
      enum:
        - Exact
        - Alias
        - Semantic
      example: Semantic
    score:
      type: number
      format: double
      example: 0.92
    reason:
      type: string
      example: 고객 도메인, 배송 시간, 선호 의미가 기존 고객 표준 용어와 가장 가깝고 배송 맥락이 추가됨

GraphRecommendationContext:
  type: object
  description: GraphDB 또는 Graphify 기반 관계 확장 결과
  required:
    - inferredDomainName
    - relatedTerms
    - relationshipHints
  properties:
    inferredDomainName:
      type: string
      example: 고객
    relatedTerms:
      type: array
      items:
        type: string
      example:
        - 고객번호
        - 고객명
        - 주문번호
    relationshipHints:
      type: array
      items:
        type: string
      example:
        - 고객번호는 주문번호와 함께 주문 조회 조건에서 자주 사용됨
        - 고객 도메인 용어는 고객명, 고객상태코드와 함께 노출되는 경우가 많음

TermRecommendationResponse:
  type: object
  description: RAG 조회, Graph 관계 확장, LLM 추론을 거쳐 생성한 용어 초안 추천 결과
  required:
    - inputKoreanName
    - normalizedKoreanName
    - recommendation
    - ragMatches
    - graphContext
    - llmReasoning
    - warnings
  properties:
    inputKoreanName:
      type: string
      example: 고객선호배송시간대
    normalizedKoreanName:
      type: string
      example: 고객선호배송시간대
    recommendation:
      $ref: '#/RecommendedTermDraft'
    ragMatches:
      type: array
      description: RAG/semantic 검색으로 찾은 근거 용어
      items:
        $ref: '#/RecommendationEvidence'
    graphContext:
      $ref: '#/GraphRecommendationContext'
    llmReasoning:
      type: string
      description: 검색과 관계 문맥을 바탕으로 추천값을 조합한 추론 설명
      example: 고객 도메인 용어와 배송 시간대 의미를 결합해 Customer Preferred Delivery Time Slot 및 CUST_PREF_DLV_TM_SLOT 후보를 추천함
    warnings:
      type: array
      items:
        type: string
      example:
        - 데이터 사전에 동일한 Approved 용어는 없어 신규 후보로 유지해야 함
        - 배송 시간대가 코드 체계로 관리된다면 상태코드/구간코드와 구분해야 함

DevelopmentAssistRequest:
  type: object
  description: AI 산출물 생성 지원 요청
  required:
    - requirementText
    - targetArtifacts
  properties:
    requirementText:
      type: string
      minLength: 1
      description: 사용자가 입력한 요구사항
      example: 고객별 주문 내역을 조회하는 API 만들어줘.
    targetArtifacts:
      type: array
      minItems: 1
      description: 생성할 산출물 유형 목록
      items:
        $ref: '#/AssistTargetArtifact'
      example:
        - DTO
        - OPENAPI_SCHEMA
        - SQL_EXAMPLE
    domainNames:
      type: array
      description: 우선 검색할 업무 도메인 목록
      items:
        type: string
      example:
        - 고객
        - 주문

DevelopmentAssistResponse:
  type: object
  description: AI 산출물 생성 지원 응답
  required:
    - requirementText
    - extractedConcepts
    - termMappings
    - generatedArtifacts
    - candidateTerms
    - warnings
  properties:
    requirementText:
      type: string
      example: 고객별 주문 내역을 조회하는 API 만들어줘.
    extractedConcepts:
      type: array
      description: 요구사항에서 추출한 업무 개념 후보
      items:
        $ref: '#/ExtractedBusinessConcept'
    termMappings:
      type: array
      description: 데이터 사전 기준 표준 용어 매핑
      items:
        $ref: '#/AssistTermMapping'
    generatedArtifacts:
      type: array
      description: 표준 용어 매핑으로 생성한 산출물 예시
      items:
        $ref: '#/GeneratedArtifact'
    candidateTerms:
      type: array
      description: 데이터 사전에 없어 승인 전 후보로 분리한 신규 용어
      items:
        $ref: '#/AssistCandidateTerm'
    warnings:
      type: array
      description: Rule Engine과 표준 정책 기반 위반 경고
      items:
        $ref: '#/StandardViolationWarning'

ExtractedBusinessConcept:
  type: object
  description: 요구사항에서 추출한 업무 개념
  required:
    - concept
    - reason
    - confidence
  properties:
    concept:
      type: string
      example: 고객번호
    reason:
      type: string
      example: 고객별 조회 조건에서 고객 식별 기준이 필요함
    confidence:
      type: number
      format: double
      minimum: 0
      maximum: 1
      example: 0.95

AssistTermMapping:
  type: object
  description: 표준 용어 매핑 결과
  required:
    - concept
    - termId
    - standardTerm
    - englishName
    - dbColumn
    - apiField
    - codeVariable
    - status
    - mappingSource
    - recommendationReason
  properties:
    concept:
      type: string
      example: 고객번호
    termId:
      type: string
      example: T-000001
    standardTerm:
      type: string
      example: 고객번호
    englishName:
      type: string
      example: Customer Number
    dbColumn:
      type: string
      example: CUST_NO
    apiField:
      type: string
      example: customerNumber
    codeVariable:
      type: string
      example: customerNumber
    status:
      $ref: './enums.yaml#/TermStatus'
    mappingSource:
      type: string
      description: 매핑 출처
      enum:
        - Exact
        - Alias
        - Semantic
      example: Exact
    recommendationReason:
      type: string
      example: 승인된 표준 용어 매핑

GeneratedArtifact:
  type: object
  description: 생성 산출물 placeholder
  required:
    - artifactType
    - name
    - content
  properties:
    artifactType:
      $ref: '#/AssistTargetArtifact'
    name:
      type: string
      example: CustomerOrderResponse
    content:
      type: string
      description: 표준 용어 기반으로 생성한 예시 내용

AssistCandidateTerm:
  type: object
  description: 신규 용어 후보
  required:
    - candidateTerm
    - reason
    - approvalRequired
  properties:
    candidateTerm:
      type: string
      example: 고객선호배송시간대
    recommendedEnglishName:
      type: string
      example: Customer Preferred Delivery Time Slot
    recommendedAbbreviation:
      type: string
      example: CUST_PREF_DLV_TM_SLOT
    reason:
      type: string
      example: 데이터 사전에 일치하는 승인 용어가 없음
    approvalRequired:
      type: boolean
      example: true

StandardViolationWarning:
  type: object
  description: 표준 위반 경고
  required:
    - inputExpression
    - severity
    - reason
  properties:
    inputExpression:
      type: string
      example: 고객ID
    severity:
      $ref: './common.yaml#/ValidationSeverity'
    standardTerm:
      type: string
      example: 고객번호
    recommendedExpression:
      type: string
      example: customerNumber
    reason:
      type: string
      example: 고객ID는 비표준 표현이며 고객번호 사용 권장
