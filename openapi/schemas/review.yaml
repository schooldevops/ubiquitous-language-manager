DocumentReviewRequest:
  type: object
  description: 기획서 본문 용어 검토 요청
  required:
    - documentText
  properties:
    documentText:
      type: string
      minLength: 1
      description: 검토할 기획서 본문
      example: 고객 ID를 입력하면 주문 리스트를 조회한다.
    domainNames:
      type: array
      description: 검토 대상 도메인 필터
      items:
        type: string
      example:
        - 고객
        - 주문
    options:
      $ref: '#/DocumentReviewOptions'

DocumentReviewOptions:
  type: object
  description: 기획서 용어 검토 옵션
  properties:
    includeCandidateTerms:
      type: boolean
      description: 미매핑 표현을 신규 용어 후보로 반환할지 여부
      default: true
      example: true
    includeValidationIssues:
      type: boolean
      description: Rule Engine 검증 결과를 포함할지 여부
      default: true
      example: true
    normalizeSentences:
      type: boolean
      description: 표준화 문장 추천을 포함할지 여부
      default: true
      example: true

DocumentReviewResult:
  type: object
  description: 기획서 본문 용어 검토 결과
  required:
    - originalText
    - recommendedText
    - detectedTerms
    - standardMappings
    - candidateTerms
    - validationIssues
  properties:
    originalText:
      type: string
      description: 원본 기획서 본문
      example: 고객 ID를 입력하면 주문 리스트를 조회한다.
    recommendedText:
      type: string
      description: 표준 용어로 치환한 추천 본문
      example: 고객번호를 입력하면 주문 목록을 조회한다.
    detectedTerms:
      type: array
      description: 검출된 용어 표현 목록
      items:
        $ref: '#/DetectedTerm'
    standardMappings:
      type: array
      description: 표준 용어 매핑표
      items:
        $ref: '#/StandardMapping'
    candidateTerms:
      type: array
      description: 데이터 사전에 매핑되지 않은 신규 용어 후보
      items:
        $ref: '#/CandidateTerm'
    validationIssues:
      type: array
      description: 표준 위반 또는 권고 사항
      items:
        $ref: './common.yaml#/ValidationIssue'

DetectedTerm:
  type: object
  description: 기획서 본문에서 검출된 용어 표현
  required:
    - expression
    - sentenceIndex
    - startOffset
    - endOffset
    - matchType
  properties:
    expression:
      type: string
      description: 본문에서 검출된 표현
      example: 고객 ID
    sentenceIndex:
      type: integer
      format: int32
      minimum: 0
      description: 문장 번호
      example: 0
    startOffset:
      type: integer
      format: int32
      minimum: 0
      description: 본문 내 시작 위치
      example: 0
    endOffset:
      type: integer
      format: int32
      minimum: 0
      description: 본문 내 종료 위치
      example: 5
    matchType:
      type: string
      description: 검출 방식
      enum:
        - Exact
        - Alias
        - Candidate
      example: Alias
    mappedTermId:
      type: string
      description: 매핑된 표준 용어 ID
      example: T-000001
    standardTerm:
      type: string
      description: 매핑된 표준 용어명
      example: 고객번호

StandardMapping:
  type: object
  description: 기획서 표현과 표준 용어 산출물 표현 매핑
  required:
    - inputExpression
    - termId
    - standardTerm
    - englishName
    - dbColumn
    - apiField
    - reason
  properties:
    inputExpression:
      type: string
      description: 기획서 입력 표현
      example: 고객 ID
    termId:
      type: string
      description: 표준 용어 ID
      example: T-000001
    standardTerm:
      type: string
      description: 한글 표준 용어명
      example: 고객번호
    englishName:
      type: string
      description: 영문 표준 용어명
      example: Customer Number
    dbColumn:
      type: string
      description: 표준 DB 컬럼명
      example: CUST_NO
    apiField:
      type: string
      description: 표준 API 필드명
      example: customerNumber
    codeVariable:
      type: string
      description: 표준 코드 변수명
      example: customerNumber
    reason:
      type: string
      description: 표준 매핑 또는 권고 사유
      example: 고객 ID는 고객번호의 유사어입니다.

CandidateTerm:
  type: object
  description: 데이터 사전에 없는 신규 용어 후보
  required:
    - expression
    - reason
    - approvalRequired
  properties:
    expression:
      type: string
      description: 신규 후보 표현
      example: 주문 리스트
    recommendedKoreanName:
      type: string
      description: 추천 한글 표준 용어명
      example: 주문목록
    reason:
      type: string
      description: 후보로 판단한 사유
      example: 데이터 사전에서 매핑되는 표준 용어를 찾지 못했습니다.
    approvalRequired:
      type: boolean
      description: 데이터 표준 승인 필요 여부
      example: true
