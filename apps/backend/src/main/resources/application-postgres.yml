# postgres 영속화 프로파일.
# 활성화: SPRING_PROFILES_ACTIVE=postgres ./gradlew bootRun
# infra/local/docker-compose.yaml 의 postgres/neo4j/redis 와 연동.
aulms:
  persistence: postgres

spring:
  # 기본 프로파일의 autoconfig exclude 목록을 비워 DB autoconfig(datasource/neo4j/redis/flyway) 재활성화.
  # 영속화는 Querydsl-SQL(SQLQueryFactory) + JdbcTemplate(pgvector) 로 수행. JPA 미사용.
  autoconfigure:
    exclude: []

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/aulms}
    username: ${POSTGRES_USER:aulms}
    password: ${POSTGRES_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Neo4j (Graphify 그래프 저장)
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD:changeme123}

  # Redis (캐시/세션)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
