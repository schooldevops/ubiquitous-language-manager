aulms:
  llm:
    provider: ${LLM_PROVIDER:gemini}

spring:
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-6
          temperature: 0.2
          max-tokens: 1024
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            model: gemini-2.0-flash
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o
    embedding:
      transformer:
        onnx:
          model-output-name: last_hidden_state
