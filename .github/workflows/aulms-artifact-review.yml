name: AULMS Artifact Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  artifact-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed-files.txt

      - name: Run AULMS artifact review
        id: review
        env:
          AULMS_API_URL: ${{ secrets.AULMS_API_URL }}
          AULMS_API_TOKEN: ${{ secrets.AULMS_API_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          ruby scripts/aulms-pr-review.rb \
            --changed-files changed-files.txt \
            --output-json build/reports/aulms-pr-review.json \
            --output-md build/reports/aulms-pr-review.md \
            --fail-on error
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Add job summary
        run: |
          cat build/reports/aulms-pr-review.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- aulms-artifact-review -->';
            const body = fs.readFileSync('build/reports/aulms-pr-review.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find(comment => comment.user.type === 'Bot' && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Fail on standard errors
        if: steps.review.outputs.exit_code != '0'
        run: exit 1
